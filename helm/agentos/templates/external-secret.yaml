{{- if .Values.externalSecrets.enabled }}
{{- if .Values.externalSecrets.secrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required" .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range $key, $val := .Values.externalSecrets.secrets }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ required (printf "externalSecrets.secrets.%s.remoteRef.key is required" $key) $val.remoteRef.key | quote }}
        {{- if $val.remoteRef.property }}
        property: {{ $val.remoteRef.property | quote }}
        {{- end }}
        {{- if $val.remoteRef.version }}
        version: {{ $val.remoteRef.version | quote }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
