{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.rdsCredentials.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "agentos.fullname" . }}-rds
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.rdsCredentials.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.rdsCredentials.secretStoreRef.name is required" .Values.externalSecrets.rdsCredentials.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.rdsCredentials.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.rdsCredentials.target.name }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ required "externalSecrets.rdsCredentials.remoteRef.usernameKey is required" .Values.externalSecrets.rdsCredentials.remoteRef.usernameKey | quote }}
    - secretKey: password
      remoteRef:
        key: {{ required "externalSecrets.rdsCredentials.remoteRef.passwordKey is required" .Values.externalSecrets.rdsCredentials.remoteRef.passwordKey | quote }}
{{- end }}
