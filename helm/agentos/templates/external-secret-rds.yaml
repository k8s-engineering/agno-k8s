{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.adminCredentials.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "agentos.fullname" . }}-admin-creds
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.adminCredentials.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.adminCredentials.secretStoreRef.name is required" .Values.externalSecrets.adminCredentials.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.adminCredentials.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.adminCredentials.target.name }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ required "externalSecrets.adminCredentials.remoteRef.usernameKey is required" .Values.externalSecrets.adminCredentials.remoteRef.usernameKey | quote }}
    - secretKey: password
      remoteRef:
        key: {{ required "externalSecrets.adminCredentials.remoteRef.passwordKey is required" .Values.externalSecrets.adminCredentials.remoteRef.passwordKey | quote }}
{{- end }}
