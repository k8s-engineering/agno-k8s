site_name: AgentOS on Kubernetes
site_url: https://k8s-engineering.github.io/agno-k8s
repo_url: https://github.com/k8s-engineering/agno-k8s
repo_name: k8s-engineering/agno-k8s

theme:
  name: readthedocs

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

extra_css:
  - css/mermaid.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - js/mermaid-init.js

nav:
  - Home: index.md
  - Agno Architecture: agno-architecture.md
  - Kubernetes Deployment: kubernetes-deployment.md

docs_dir: docs
