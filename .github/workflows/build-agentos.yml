name: Build AgentOS

on:
  push:
    branches: [main]
    paths:
      - "agentos/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          # Find latest tag for this package (agentos/v*)
          LATEST=$(git tag -l 'agentos/v*' --sort=-v:refname | head -n1)
          if [[ -z "$LATEST" ]]; then
            NEW_VERSION="1.0.0"
          else
            # Extract version, increment patch
            VER=${LATEST#agentos/v}
            MAJOR=${VER%%.*}
            REMAINDER=${VER#*.}
            MINOR=${REMAINDER%%.*}
            PATCH=${REMAINDER#*.}
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${NEW_VERSION}"

      - name: Create and push version tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "agentos/v${{ steps.version.outputs.version }}"
          git push origin "agentos/v${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: agentos
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}/agentos:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/agentos:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
